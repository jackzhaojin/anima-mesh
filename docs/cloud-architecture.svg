<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1000" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#57606a"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8c959f"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="1000" fill="#ffffff"/>

  <text x="40" y="46" font-size="21" font-weight="700" fill="#1f2328">AnimaMesh cloud tier — one engine, one private brain per instance</text>
  <text x="40" y="70" font-size="13" fill="#57606a">Scheduled beats + inbound directions + a principal-only dashboard. Git holds durable knowledge and evidence; Durable Objects hold only control state.</text>

  <!-- ==================== LEFT: THE PRINCIPAL ==================== -->
  <text x="160" y="122" font-size="12" font-weight="700" fill="#57606a" text-anchor="middle" letter-spacing="1">THE PRINCIPAL (one human)</text>

  <rect x="40" y="140" width="240" height="180" rx="10" fill="#eef1fe" stroke="#5865f2" stroke-width="1.5"/>
  <text x="56" y="168" font-size="15" font-weight="700" fill="#3b45b0">Discord</text>
  <text x="56" y="190" font-size="12" fill="#3f4660">DMs with the mesh's persona</text>
  <text x="56" y="210" font-size="12" fill="#3f4660">• sends /direct (any request,</text>
  <text x="66" y="227" font-size="12" fill="#3f4660">read agentically — no keywords)</text>
  <text x="56" y="249" font-size="12" fill="#3f4660">• receives the daily brief</text>
  <text x="56" y="269" font-size="12" fill="#3f4660">• receives direction replies</text>
  <text x="56" y="289" font-size="12" fill="#3f4660">• receives failure DMs</text>

  <rect x="40" y="565" width="240" height="156" rx="10" fill="#e9f5ee" stroke="#1a7f37" stroke-width="1.5"/>
  <text x="56" y="593" font-size="15" font-weight="700" fill="#116329">Browser</text>
  <text x="56" y="615" font-size="12" fill="#2f4a3a">the observability surface:</text>
  <text x="56" y="635" font-size="12" fill="#2f4a3a">• Google OIDC + email allowlist</text>
  <text x="56" y="655" font-size="12" fill="#2f4a3a">• beats, ledger, reports,</text>
  <text x="66" y="672" font-size="12" fill="#2f4a3a">approvals, engine pin</text>
  <text x="56" y="696" font-size="12" fill="#2f4a3a">• trigger a beat now</text>

  <!-- ==================== CENTER: CLOUDFLARE ==================== -->
  <rect x="340" y="110" width="540" height="700" rx="14" fill="#fff8f0" stroke="#f6821f" stroke-width="1.5"/>
  <text x="360" y="136" font-size="12" font-weight="700" fill="#9a5b13" letter-spacing="1">CLOUDFLARE — always on, no servers, nothing runs between events</text>

  <rect x="370" y="156" width="480" height="334" rx="10" fill="#ffffff" stroke="#8c959f" stroke-width="1.2"/>
  <text x="386" y="182" font-size="15" font-weight="700" fill="#1f2328">heartbeat Worker <tspan font-weight="400" fill="#57606a" font-size="12">— the mesh's runtime</tspan></text>

  <rect x="390" y="200" width="212" height="180" rx="8" fill="#edf5ff" stroke="#54aeff" stroke-width="1.2"/>
  <text x="404" y="224" font-size="13.5" font-weight="700" fill="#0a5bd3">HeartbeatDO</text>
  <text x="404" y="246" font-size="12" fill="#33445c">daily alarm, DST-correct</text>
  <text x="404" y="266" font-size="12" fill="#33445c">runs every due agent</text>
  <text x="404" y="286" font-size="12" fill="#33445c">spokes first, hub last;</text>
  <text x="404" y="303" font-size="12" fill="#33445c">a failed spoke never</text>
  <text x="404" y="320" font-size="12" fill="#33445c">kills the beat</text>
  <text x="404" y="342" font-size="11.5" fill="#33445c">state: alarm + beat mutex</text>
  <text x="404" y="365" font-size="12" fill="#33445c" font-style="italic">re-arms in finally</text>

  <rect x="618" y="200" width="212" height="180" rx="8" fill="#edf5ff" stroke="#54aeff" stroke-width="1.2"/>
  <text x="632" y="224" font-size="13.5" font-weight="700" fill="#0a5bd3">DirectionDO</text>
  <text x="632" y="246" font-size="12" fill="#33445c">inbound queue + shared</text>
  <text x="632" y="263" font-size="12" fill="#33445c">daily budget + Gmail dedup</text>
  <text x="632" y="285" font-size="12" fill="#33445c">immediate alarm drains</text>
  <text x="632" y="302" font-size="12" fill="#33445c">one agentic run per</text>
  <text x="632" y="319" font-size="12" fill="#33445c">message</text>
  <text x="632" y="342" font-size="11.5" fill="#33445c">state: queue + budget + dedup</text>
  <text x="632" y="365" font-size="12" fill="#33445c" font-style="italic">optional Gmail poll</text>

  <text x="610" y="408" font-size="11.5" fill="#57606a" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">GET /healthz · POST /beat (bearer) · POST /interactions (Ed25519)</text>
  <text x="610" y="428" font-size="11.5" fill="#57606a" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">GET /graph/check · GET /docs/check (bearer)</text>
  <text x="610" y="448" font-size="11.5" fill="#57606a" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">GET /.well-known/agent-card.json</text>
  <text x="610" y="476" font-size="11.5" fill="#9a5b13" text-anchor="middle" font-style="italic">bundle + opted-in read sources → prompt; replies only AFTER the evidence commit</text>

  <rect x="370" y="565" width="480" height="216" rx="10" fill="#ffffff" stroke="#8c959f" stroke-width="1.2"/>
  <text x="386" y="591" font-size="15" font-weight="700" fill="#1f2328">web Worker <tspan font-weight="400" fill="#57606a" font-size="12">— the dashboard (a separate deploy)</tspan></text>
  <text x="386" y="617" font-size="12" fill="#33445c">in-Worker Google OIDC; email allowlist re-checked on EVERY request</text>
  <text x="386" y="637" font-size="12" fill="#33445c">nothing is served unauthenticated — strangers see only a login redirect</text>
  <text x="386" y="657" font-size="12" fill="#33445c">server-rendered HTML: last beat, ledger tail, reports, pending approvals</text>
  <text x="386" y="677" font-size="12" fill="#33445c">narrow env: read token + beat trigger only — it can neither think nor</text>
  <text x="386" y="694" font-size="12" fill="#33445c">speak as the persona</text>
  <text x="386" y="720" font-size="11.5" fill="#57606a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">/ · /auth/login · /auth/callback · /logout · POST /actions/beat</text>

  <path d="M 610 565 L 610 494" stroke="#57606a" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>
  <text x="622" y="524" font-size="11" fill="#57606a">POST /beat</text>
  <text x="622" y="539" font-size="11" fill="#57606a">(token stays server-side)</text>

  <!-- ==================== RIGHT: REPOS, SOURCES, MODELS, LAPTOP ==================== -->
  <rect x="940" y="140" width="300" height="252" rx="10" fill="#f6f8fa" stroke="#57606a" stroke-width="1.5"/>
  <text x="956" y="168" font-size="15" font-weight="700" fill="#1f2328">the brain — private GitHub repo</text>
  <text x="956" y="190" font-size="12" fill="#414a55">bundle/ (facts · decisions · agents ·</text>
  <text x="966" y="207" font-size="12" fill="#414a55">constitution — one concept per file)</text>
  <text x="956" y="229" font-size="12" fill="#414a55">ledger/actions.jsonl (append-only)</text>
  <text x="956" y="249" font-size="12" fill="#414a55">reports/ · approvals/ · drafts/</text>
  <line x1="956" y1="264" x2="1224" y2="264" stroke="#d0d7de"/>
  <text x="956" y="286" font-size="12" fill="#414a55" font-weight="600">read: one tarball per beat/drain</text>
  <text x="956" y="306" font-size="12" fill="#414a55" font-weight="600">write: one commit per beat/drain,</text>
  <text x="966" y="323" font-size="12" fill="#414a55" font-weight="600">authored by the mesh, never forced</text>
  <text x="956" y="349" font-size="12" fill="#57606a" font-style="italic">git log is the durable audit trail</text>
  <text x="956" y="374" font-size="12" fill="#57606a" font-style="italic">swap the repo → run another instance</text>

  <rect x="940" y="420" width="300" height="144" rx="10" fill="#fff8e7" stroke="#bf8700" stroke-width="1.5"/>
  <text x="956" y="448" font-size="15" font-weight="700" fill="#7d4e00">read-only context sources</text>
  <text x="956" y="470" font-size="12" fill="#594514">OneDrive / SharePoint via Graph</text>
  <text x="956" y="490" font-size="12" fill="#594514">git-hosted docs via GitHub REST</text>
  <text x="956" y="510" font-size="12" fill="#594514">agents opt in with sources: frontmatter;</text>
  <text x="956" y="527" font-size="12" fill="#594514">live listings are inlined into the prompt</text>
  <text x="956" y="546" font-size="11.5" fill="#846500" font-style="italic">failure becomes honest context;</text>
  <text x="956" y="560" font-size="11.5" fill="#846500" font-style="italic">never an aborted run</text>

  <rect x="940" y="594" width="300" height="128" rx="10" fill="#faf5ff" stroke="#8250df" stroke-width="1.5"/>
  <text x="956" y="622" font-size="15" font-weight="700" fill="#6639ba">model vendor APIs</text>
  <text x="956" y="644" font-size="12" fill="#4a3f63">pure fetch — no SDKs, no subprocesses</text>
  <text x="956" y="664" font-size="12" fill="#4a3f63">each agent declares model + harness;</text>
  <text x="956" y="681" font-size="12" fill="#4a3f63">cognition.overrides reroutes per instance</text>
  <text x="956" y="703" font-size="12" fill="#6e5a94" font-style="italic">moonshot-api · anthropic-api</text>

  <rect x="940" y="758" width="300" height="112" rx="10" fill="none" stroke="#8c959f" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="956" y="786" font-size="15" font-weight="700" fill="#57606a">laptop tier (optional)</text>
  <text x="956" y="808" font-size="12" fill="#57606a">same engine via CLI over a clone —</text>
  <text x="956" y="825" font-size="12" fill="#57606a">pull --rebase before writing; local docs</text>
  <text x="956" y="842" font-size="12" fill="#57606a">trees + subprocess harnesses live here</text>

  <!-- ==================== FLOWS ==================== -->
  <path d="M 280 205 L 366 205" stroke="#57606a" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>
  <circle cx="302" cy="205" r="9" fill="#5865f2"/>
  <text x="302" y="209" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="700">1</text>
  <text x="332" y="196" font-size="11" fill="#57606a" text-anchor="middle">/direct</text>

  <path d="M 370 258 L 284 258" stroke="#57606a" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>
  <circle cx="348" cy="258" r="9" fill="#5865f2"/>
  <text x="348" y="262" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="700">2</text>
  <text x="316" y="249" font-size="11" fill="#57606a" text-anchor="middle">reply</text>

  <path d="M 370 305 L 284 305" stroke="#57606a" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>
  <circle cx="348" cy="305" r="9" fill="#5865f2"/>
  <text x="348" y="309" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="700">3</text>
  <text x="316" y="296" font-size="11" fill="#57606a" text-anchor="middle">daily brief</text>

  <path d="M 936 218 L 854 218" stroke="#57606a" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>
  <text x="895" y="208" font-size="11" fill="#57606a" text-anchor="middle">one tarball</text>
  <path d="M 850 268 L 936 268" stroke="#57606a" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>
  <text x="895" y="288" font-size="11" fill="#57606a" text-anchor="middle">one commit</text>

  <path d="M 936 492 C 900 492, 900 440, 854 440" stroke="#57606a" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>
  <text x="895" y="511" font-size="11" fill="#57606a" text-anchor="middle">live prompt context</text>

  <path d="M 850 380 C 905 380, 905 632, 936 632" stroke="#57606a" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>
  <text x="900" y="582" font-size="11" fill="#57606a" text-anchor="middle">cognition</text>
  <text x="900" y="597" font-size="11" fill="#57606a" text-anchor="middle">(pure fetch)</text>

  <path d="M 854 676 L 920 676 L 920 390 L 958 390" stroke="#57606a" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>
  <text x="887" y="697" font-size="11" fill="#57606a" text-anchor="middle">view-only brain read</text>

  <path d="M 280 620 L 366 620" stroke="#57606a" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>
  <text x="323" y="612" font-size="11" fill="#57606a" text-anchor="middle">Google OIDC</text>
  <path d="M 370 670 L 284 670" stroke="#57606a" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>
  <text x="323" y="690" font-size="11" fill="#57606a" text-anchor="middle">dashboard HTML</text>

  <path d="M 1240 814 C 1270 814, 1270 330, 1244 316" stroke="#8c959f" stroke-width="1.3" fill="none" stroke-dasharray="6 4" marker-end="url(#arrow-dashed)"/>
  <text transform="rotate(-90 1262 582)" x="1262" y="582" font-size="11" fill="#8c959f" text-anchor="middle">git pull / push</text>

  <!-- ==================== LEGEND ==================== -->
  <line x1="40" y1="900" x2="1240" y2="900" stroke="#d0d7de"/>
  <text x="40" y="924" font-size="12" fill="#414a55"><tspan font-weight="700" fill="#3b45b0">1→2 a direction:</tspan> verify signature + sender + budget → queue → agent reads the message with brain and source context → evidence commit → reply.</text>
  <text x="40" y="946" font-size="12" fill="#414a55"><tspan font-weight="700" fill="#3b45b0">3 a beat:</tspan> daily alarm → read brain → run due agents → verify seams → one commit → deliver the hub's brief; source gaps stay explicit in prompts.</text>
  <text x="40" y="968" font-size="12" fill="#414a55"><tspan font-weight="700" fill="#116329">state boundary:</tspan> Git holds durable knowledge and evidence; DO storage is limited to alarms, locks, queues, budgets, and dedup state.</text>
</svg>
