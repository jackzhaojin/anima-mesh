<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ro-ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#57606a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="760" fill="#ffffff"/>

  <text x="40" y="46" font-size="21" font-weight="700" fill="#1f2328">The roster is data — how agents are born, scheduled, and trusted</text>
  <text x="40" y="70" font-size="13" fill="#57606a">An agent is a markdown file. Creating one is copying a template; scheduling one is a frontmatter field; trusting one is an edit with git history.</text>

  <!-- ==================== ROW 1: BIRTH ==================== -->
  <rect x="40" y="100" width="330" height="252" rx="12" fill="#faf5ff" stroke="#8250df" stroke-width="1.5"/>
  <text x="58" y="128" font-size="15" font-weight="700" fill="#6639ba">1 · born in the engine</text>
  <text x="58" y="150" font-size="12" fill="#4a3f63" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">templates/agents/ — 9 archetypes</text>
  <text x="58" y="174" font-size="12" fill="#4a3f63">back office: chief-of-staff · compliance-ops ·</text>
  <text x="58" y="191" font-size="12" fill="#4a3f63">bookkeeper · librarian · governance ·</text>
  <text x="58" y="208" font-size="12" fill="#4a3f63">research-watch</text>
  <text x="58" y="230" font-size="12" fill="#4a3f63">commercial: sales-qualification ·</text>
  <text x="58" y="247" font-size="12" fill="#4a3f63">lead-identification · inbound-triage</text>
  <text x="58" y="277" font-size="11.5" fill="#6e5a94" font-style="italic">identity arrives only as {{PLACEHOLDER}}s —</text>
  <text x="58" y="294" font-size="11.5" fill="#6e5a94" font-style="italic">roles are generic, the engine never ships</text>
  <text x="58" y="311" font-size="11.5" fill="#6e5a94" font-style="italic">a company, person, or persona</text>

  <path d="M 370 226 L 436 226" stroke="#57606a" stroke-width="1.4" fill="none" marker-end="url(#ro-ar)"/>
  <text x="403" y="210" font-size="11" fill="#57606a" text-anchor="middle">init fills</text>
  <text x="403" y="246" font-size="11" fill="#57606a" text-anchor="middle">placeholders</text>

  <rect x="440" y="100" width="380" height="252" rx="12" fill="#e9f5ee" stroke="#1a7f37" stroke-width="1.5"/>
  <text x="458" y="128" font-size="15" font-weight="700" fill="#116329">2 · lives in the brain</text>
  <text x="458" y="150" font-size="12" fill="#2f4a3a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">bundle/agents/&lt;name&gt;.md</text>
  <rect x="458" y="162" width="344" height="128" rx="7" fill="#ffffff" stroke="#a9d6bb" stroke-width="1.1"/>
  <text x="474" y="184" font-size="11.5" fill="#33513f" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">level: L1        # always starts here</text>
  <text x="474" y="202" font-size="11.5" fill="#33513f" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">model / harness  # its cognition</text>
  <text x="474" y="220" font-size="11.5" fill="#33513f" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">heartbeat: weekly   # its rhythm</text>
  <text x="474" y="238" font-size="11.5" fill="#33513f" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">sources: [onedrive] # context opt-in</text>
  <text x="474" y="256" font-size="11.5" fill="#33513f" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">whitelist: []    # L3 allowed actions</text>
  <text x="474" y="274" font-size="11.5" fill="#33513f" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">commercial: false   # dual-gate flag</text>
  <text x="458" y="314" font-size="11.5" fill="#4c8f63" font-style="italic">below the frontmatter: the job description,</text>
  <text x="458" y="331" font-size="11.5" fill="#4c8f63" font-style="italic">in prose — the part a model actually reads</text>

  <path d="M 820 226 L 886 226" stroke="#57606a" stroke-width="1.4" fill="none" marker-end="url(#ro-ar)"/>
  <text x="853" y="210" font-size="11" fill="#57606a" text-anchor="middle">discovered</text>
  <text x="853" y="246" font-size="11" fill="#57606a" text-anchor="middle">every beat</text>

  <rect x="890" y="100" width="350" height="252" rx="12" fill="#edf5ff" stroke="#54aeff" stroke-width="1.5"/>
  <text x="908" y="128" font-size="15" font-weight="700" fill="#0a5bd3">3 · scheduled by its own file</text>
  <text x="908" y="152" font-size="12" fill="#33445c">no registry anywhere — the roster IS the files;</text>
  <text x="908" y="169" font-size="12" fill="#33445c">the beat re-reads them from the repo every day</text>
  <text x="908" y="196" font-size="12" fill="#33445c">due today? <tspan fill="#57606a">cadence vs. the ledger's record</tspan></text>
  <text x="908" y="216" font-size="12" fill="#33445c">runnable here? <tspan fill="#57606a">cloud needs a pure-fetch</tspan></text>
  <text x="918" y="233" font-size="12" fill="#57606a">harness; others wait for the laptop tier</text>
  <text x="908" y="253" font-size="12" fill="#33445c">allowed at all? <tspan fill="#57606a">commercial agents check</tspan></text>
  <text x="918" y="270" font-size="12" fill="#57606a">their activation gates first</text>
  <text x="908" y="297" font-size="11.5" fill="#0a5bd3" font-style="italic">due spokes run A→Z, one at a time; the hub runs last —</text>
  <text x="908" y="314" font-size="11.5" fill="#0a5bd3" font-style="italic">and ops/schedule.md adds wakes · pauses · overrides</text>

  <!-- ==================== ROW 2: TRUST ==================== -->
  <rect x="40" y="392" width="560" height="250" rx="12" fill="#f6f8fa" stroke="#57606a" stroke-width="1.5"/>
  <text x="58" y="420" font-size="15" font-weight="700" fill="#1f2328">the autonomy ladder — trust is a dial with a paper trail</text>

  <rect x="58" y="438" width="122" height="64" rx="8" fill="#ffffff" stroke="#8c959f" stroke-width="1.2"/>
  <text x="119" y="460" font-size="12.5" font-weight="700" fill="#1f2328" text-anchor="middle">L1</text>
  <text x="119" y="478" font-size="11" fill="#57606a" text-anchor="middle">report-only</text>
  <text x="119" y="493" font-size="10.5" fill="#8c959f" text-anchor="middle" font-style="italic">everyone starts</text>
  <path d="M 180 470 L 198 470" stroke="#57606a" stroke-width="1.3" fill="none" marker-end="url(#ro-ar)"/>

  <rect x="200" y="438" width="122" height="64" rx="8" fill="#ffffff" stroke="#8c959f" stroke-width="1.2"/>
  <text x="261" y="460" font-size="12.5" font-weight="700" fill="#1f2328" text-anchor="middle">L2</text>
  <text x="261" y="478" font-size="11" fill="#57606a" text-anchor="middle">draft for approval</text>
  <path d="M 322 470 L 340 470" stroke="#57606a" stroke-width="1.3" fill="none" marker-end="url(#ro-ar)"/>

  <rect x="342" y="438" width="122" height="64" rx="8" fill="#ffffff" stroke="#8c959f" stroke-width="1.2"/>
  <text x="403" y="460" font-size="12.5" font-weight="700" fill="#1f2328" text-anchor="middle">L3</text>
  <text x="403" y="478" font-size="11" fill="#57606a" text-anchor="middle">whitelisted</text>
  <text x="403" y="493" font-size="11" fill="#57606a" text-anchor="middle">reversible actions</text>
  <path d="M 464 470 L 482 470" stroke="#57606a" stroke-width="1.3" fill="none" marker-end="url(#ro-ar)"/>

  <rect x="484" y="438" width="98" height="64" rx="8" fill="#ffffff" stroke="#8c959f" stroke-width="1.2"/>
  <text x="533" y="460" font-size="12.5" font-weight="700" fill="#1f2328" text-anchor="middle">L4</text>
  <text x="533" y="478" font-size="11" fill="#57606a" text-anchor="middle">external, gated</text>
  <text x="533" y="493" font-size="10.5" fill="#8c959f" text-anchor="middle" font-style="italic">per action, forever</text>

  <text x="58" y="530" font-size="12" fill="#414a55">promotion is a one-line frontmatter edit — reviewed, committed, revertible;</text>
  <text x="58" y="548" font-size="12" fill="#414a55">the ladder is enforced in deterministic code, never in a prompt</text>
  <rect x="58" y="566" width="524" height="56" rx="8" fill="#ffebe9" stroke="#cf222e" stroke-width="1.2"/>
  <text x="74" y="588" font-size="12" font-weight="700" fill="#a40e26">at every level, the constitution's gated actions end at the human:</text>
  <text x="74" y="608" font-size="11.5" fill="#6e2830">money movement · government filings · publishing · credentials · access</text>

  <rect x="640" y="392" width="290" height="250" rx="12" fill="none" stroke="#cf222e" stroke-width="1.4" stroke-dasharray="7 5"/>
  <text x="658" y="420" font-size="15" font-weight="700" fill="#a40e26">the commercial dual-gate</text>
  <text x="658" y="444" font-size="12" fill="#57606a">agents marked commercial: true are</text>
  <text x="658" y="461" font-size="12" fill="#57606a">designed capable but refuse to run until</text>
  <text x="658" y="478" font-size="12" fill="#57606a">the instance config opens BOTH gates:</text>
  <text x="658" y="506" font-size="11.5" fill="#414a55" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">boundaryMapVerified: false</text>
  <text x="658" y="524" font-size="11.5" fill="#414a55" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">optionTrigger: null</text>
  <text x="658" y="542" font-size="11.5" fill="#414a55" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">founderWaiver: false</text>
  <text x="658" y="574" font-size="11.5" fill="#a40e26" font-style="italic">a legal/organizational fact, recorded as</text>
  <text x="658" y="591" font-size="11.5" fill="#a40e26" font-style="italic">config — capability never outruns</text>
  <text x="658" y="608" font-size="11.5" fill="#a40e26" font-style="italic">permission</text>

  <rect x="970" y="392" width="270" height="250" rx="12" fill="#edf5ff" stroke="#54aeff" stroke-width="1.5"/>
  <text x="988" y="420" font-size="15" font-weight="700" fill="#0a5bd3">why a hub at all</text>
  <text x="988" y="444" font-size="12" fill="#33445c">N spokes produce N reports a day;</text>
  <text x="988" y="461" font-size="12" fill="#33445c">nobody hired a principal to read N</text>
  <text x="988" y="481" font-size="12" fill="#33445c">the hub runs last, reads them fresh,</text>
  <text x="988" y="498" font-size="12" fill="#33445c">and writes the ONE brief — routing,</text>
  <text x="988" y="515" font-size="12" fill="#33445c">reprioritizing, and nagging by judgment</text>
  <text x="988" y="542" font-size="12" fill="#33445c">it holds no state and never triggers</text>
  <text x="988" y="559" font-size="12" fill="#33445c">directly — but its gated schedule-request</text>
  <text x="988" y="576" font-size="12" fill="#33445c">can wake a spoke for the NEXT beat</text>
  <text x="988" y="603" font-size="11.5" fill="#0a5bd3" font-style="italic">review the work today, schedule the</text>
  <text x="988" y="620" font-size="11.5" fill="#0a5bd3" font-style="italic">follow-through for tomorrow</text>

  <!-- ==================== LEGEND ==================== -->
  <line x1="40" y1="674" x2="1240" y2="674" stroke="#d0d7de"/>
  <text x="40" y="698" font-size="12" fill="#414a55"><tspan font-weight="700" fill="#116329">A dynamic roster:</tspan> adding an agent is adding a file; retiring one is deleting it; re-aiming one is editing prose. The next beat picks it up — no deploy, no registration.</text>
  <text x="40" y="720" font-size="12" fill="#414a55"><tspan font-weight="700" fill="#6639ba">Identity is configuration:</tspan> the same nine templates can animate any company; what they become is written only in that company's private brain.</text>
</svg>
